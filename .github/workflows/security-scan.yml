name: Security Scan

on:
  push:
    branches:
      - main
      - 'release/**'

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'smartorder'
          path: '.'
          format: 'HTML'
          failOnCVSS: 7.0

  trivy-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service, notification-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smartorder/${{ matrix.service }}:latest -f infrastructure/docker/${{ matrix.service }}.Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'smartorder/${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
