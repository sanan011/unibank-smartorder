name: Release Pipeline

on:
  push:
    branches:
      - 'release/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and Test
        run: ./gradlew build

  docker-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [order-service, payment-service, notification-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract branch name for tag
        id: extract_tag
        run: echo "TAG=${GITHUB_REF#refs/heads/release/}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ env.TAG }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
