version: '3.8'

services:
  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: ${DB_NAME:-order_db}
      POSTGRES_USER: ${DB_USER:-smartorder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret_db_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartorder} -d ${DB_NAME:-order_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: ${DB_NAME_PAYMENT:-payment_db}
      POSTGRES_USER: ${DB_USER:-smartorder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret_db_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartorder} -d ${DB_NAME_PAYMENT:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-supersecret_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-supersecret_rmq_password}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ../infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  order-service:
    build:
      context: ..
      dockerfile: infrastructure/docker/order-service.Dockerfile
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres-order
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-order_db}
      - DB_USER=${DB_USER:-smartorder}
      - DB_PASSWORD=${DB_PASSWORD:-supersecret_db_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-supersecret_redis_password}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-supersecret_rmq_password}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build:
      context: ..
      dockerfile: infrastructure/docker/payment-service.Dockerfile
    container_name: payment-service
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres-payment
      - DB_PORT=5432
      - DB_NAME=${DB_NAME_PAYMENT:-payment_db}
      - DB_USER=${DB_USER:-smartorder}
      - DB_PASSWORD=${DB_PASSWORD:-supersecret_db_password}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-supersecret_rmq_password}
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-smartorder}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-smartorder123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-notification_db}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://smartorder:smartorder123@localhost:27017/notification_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notification-service:
    build:
      context: ..
      dockerfile: infrastructure/docker/notification-service.Dockerfile
    container_name: notification-service
    ports:
      - "8082:8082"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-smartorder}:${MONGO_PASSWORD:-smartorder123}@mongodb:27017/${MONGO_DB:-notification_db}?authSource=admin
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-supersecret_rmq_password}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ../infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_payment_data:
  redis_data:
  rabbitmq_data:
  mongodb_data:
