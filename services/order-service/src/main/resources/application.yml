spring:
  application:
    name: order-service
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USER:smartorder}
    password: ${DB_PASSWORD:supersecret_db_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      data-source-properties:
        # Let PostgreSQL infer/cast bound String parameters to their column type (e.g. jsonb for the
        # outbox payload). Without this, inserting a JSON String into a jsonb column fails with
        # "column is of type jsonb but expression is of type character varying".
        stringtype: unspecified

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:supersecret_redis_password}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:supersecret_rmq_password}

jwt:
  secret: ${JWT_SECRET:8f7b5a1b3c9e42659d87f5a6b3c9e42d7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c}
  expiration:
    access: 3600000
    refresh: 604800000

server:
  port: 8080
  forward-headers-strategy: NATIVE
  servlet:
    context-path: /api/v1

security:
  trusted-proxy-cidrs: ${TRUSTED_PROXY_CIDRS:127.0.0.1}

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

rate-limit:
  enabled: true
  limit: 10
  window-seconds: 60
